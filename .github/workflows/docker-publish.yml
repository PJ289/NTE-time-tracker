name: Docker Publish

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: pj289/nte-time-tracker-nte-server
          tags: |
            # Push to dev branch → :dev tag only
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # Push to main branch → :latest tag only (no version tag)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Git release tag vX.Y.Z → :latest + :X.Y.Z
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pre-pull BuildKit image (retry on registry timeout)
        run: |
          set -euo pipefail
          image="moby/buildkit:buildx-stable-1"
          for attempt in 1 2 3 4 5; do
            echo "Pulling $image (attempt $attempt)..."
            if docker pull "$image"; then
              echo "BuildKit image ready."
              exit 0
            fi
            echo "Pull failed; waiting before retry..."
            sleep $((attempt * 20))
          done
          echo "BuildKit image pull failed after retries."
          exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:buildx-stable-1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
