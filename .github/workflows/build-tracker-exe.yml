name: Build Tracker EXE

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload to latest release'
        required: false
        default: 'false'

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build exe
        run: .\build-exe.ps1
        shell: pwsh

      - name: Verify exe
        run: |
          $size = (Get-Item nte-tracker.exe).Length
          Write-Host "nte-tracker.exe size: $([math]::Round($size/1MB, 1)) MB"
        shell: pwsh

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nte-tracker-exe
          path: nte-tracker.exe
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.upload_to_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: nte-tracker.exe
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
