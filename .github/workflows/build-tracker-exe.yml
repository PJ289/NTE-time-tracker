name: Build Tracker EXE

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload to latest release'
        required: false
        default: 'false'

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build exe
        run: .\build-exe.ps1
        shell: pwsh

      - name: Verify exe
        run: |
          $size = (Get-Item nte-tracker.exe).Length
          Write-Host "nte-tracker.exe size: $([math]::Round($size/1MB, 1)) MB"
        shell: pwsh

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nte-tracker-exe
          path: nte-tracker.exe
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.upload_to_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          } else {
            $tag = gh release list --limit 1 --json tagName -q ".[0].tagName"
          }
          if (-not $tag) {
            throw "No release tag found to upload nte-tracker.exe"
          }
          Write-Host "Uploading nte-tracker.exe to release $tag"
          gh release upload $tag nte-tracker.exe --clobber
